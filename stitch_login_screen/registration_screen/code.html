<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration Screen</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                        "surface-dark": "#393028",
                        "surface-light": "#ffffff",
                        "placeholder": "#baab9c",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem", 
                        "lg": "1.5rem", 
                        "xl": "3rem", // Pill shape
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit to blend in */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #393028;
            border-radius: 20px;
        }
        
        /* Toggle Switch Animation Classes */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #f48c25;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #f48c25;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-gray-900 dark:text-white transition-colors duration-200">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto shadow-2xl">
<!-- Header -->
<header class="flex items-center justify-between p-4 pt-6 pb-2 z-10 sticky top-0 bg-background-light dark:bg-background-dark bg-opacity-95 backdrop-blur-sm">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-gray-900 dark:text-white" style="font-size: 24px;">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight flex-1 text-center pr-10">Create Profile</h1>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pb-8 overflow-y-auto">
<!-- Intro Text -->
<div class="mb-8 mt-2 text-center">
<p class="text-gray-600 dark:text-[#baab9c] text-base font-normal leading-relaxed">
                    Join the table. Track plays, find local groups, and discover your next favorite board game.
                </p>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="event.preventDefault();">
<!-- Nickname -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Nickname</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder group-focus-within:text-primary transition-colors">smart_toy</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="MeepleMaster99" type="text"/>
</div>
</div>
<!-- Name Fields -->
<div class="flex gap-4">
<div class="space-y-2 flex-1">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">First Name</label>
<input class="w-full h-14 px-5 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="Jane" type="text"/>
</div>
<div class="space-y-2 flex-1">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Last Name</label>
<input class="w-full h-14 px-5 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder group-focus-within:text-primary transition-colors">call</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Country -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Country</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder group-focus-within:text-primary transition-colors">public</span>
</div>
<select class="w-full h-14 pl-12 pr-10 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base text-gray-900 dark:text-white transition-all shadow-sm appearance-none">
<option disabled="" selected="" value="">Select your country</option>
<option value="US">United States</option>
<option value="CA">Canada</option>
<option value="UK">United Kingdom</option>
<option value="DE">Germany</option>
<option value="FR">France</option>
<option value="JP">Japan</option>
</select>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder">expand_more</span>
</div>
</div>
</div>
<!-- Location Toggle -->
<div class="flex items-center justify-between py-3 px-2">
<div class="flex flex-col">
<span class="text-base font-medium text-gray-900 dark:text-white">Enable Location</span>
<span class="text-sm text-gray-500 dark:text-[#baab9c]">Find local game nights nearby</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-14 h-8 bg-gray-200 dark:bg-surface-dark peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-700 dark:text-gray-200 ml-2">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-placeholder group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-white dark:bg-surface-dark border-transparent focus:border-primary focus:ring-primary rounded-xl text-base placeholder-placeholder transition-all shadow-sm" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center focus:outline-none" type="button">
<span class="material-symbols-outlined text-placeholder hover:text-gray-500 dark:hover:text-white transition-colors cursor-pointer">visibility</span>
</button>
</div>
<p class="text-xs text-gray-500 dark:text-[#baab9c] ml-2">Must be at least 8 characters long.</p>
</div>
</form>
<div class="h-10"></div> <!-- Spacer -->
<!-- Actions -->
<div class="mt-auto space-y-4">
<button class="w-full h-14 bg-primary hover:bg-orange-600 text-white font-bold rounded-xl shadow-lg shadow-orange-900/20 active:scale-[0.98] transition-all text-lg">
                    Create Account
                </button>
<p class="text-center text-sm text-gray-600 dark:text-[#baab9c]">
                    Already have an account? 
                    <a class="text-primary hover:text-orange-400 font-semibold transition-colors" href="#">Log In</a>
</p>
</div>
</main>
<!-- Bottom Safe Area Spacer for iOS -->
<div class="h-6 w-full bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
